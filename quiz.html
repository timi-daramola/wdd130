<!DOCTYPE html>
<html lang="en">
<head>

                <option value="">Chose One...</option>
                <option value="">//margin: 10px 5px 15px; </option>
                <option value="">/*margin: 10px 5px 15px;*/</option>

            <label for="q4">4. What is the bottom margin given this declaration?</label>

            <input type="text" name="q4" id="q4">

    </div>
